# auto:exclude-from-parity
# ^ MUST remain the first line. ci-parity-check.sh ignores any workflow whose
#   line 1 carries this marker, so this backstop never breaks develop/develop-auto
#   CI parity (it is auto-infrastructure, not a CI gate).
#
# Server-side base-lock backstop (OPTIONAL — the user adds this at bootstrap).
# Defense-in-depth behind bin/auto-pr-create.sh's three local guards: it fails any
# auto-authored PR whose base branch is not develop-auto. Belt-and-suspenders so a
# misconfigured gh default-branch fallback can never land auto work on main/develop.
#
# "Auto-authored" is recognized two ways:
#   1. head branch matches the auto/<type>/<issue#>-<slug> convention (auto/*) —
#      the PRIMARY signal; always active. OR
#   2. (optional) PR author login == the repo/org variable AUTO_GH_ACCOUNT, when
#      that variable is set. The engine follows the installing user's local gh
#      account, so there is no built-in default login; set the variable only if
#      you want the author-based guard in addition to the branch-name guard.
# Human PRs (non-auto/* branch + non-matching author) are unaffected.
#
# pull_request_target runs in the BASE repo context. This workflow performs NO
# checkout and runs NO PR code — it only reads event metadata — so the elevated
# context is safe.
name: auto-base-guard

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read

jobs:
  guard-base:
    name: Enforce develop-auto base for auto PRs
    runs-on: ubuntu-latest
    steps:
      - name: Reject auto PRs not targeting develop-auto
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          # OPTIONAL author guard: set the repo/org variable AUTO_GH_ACCOUNT to the
          # gh login your loop runs as to also match PRs by author. Empty = branch-
          # name matching only (the engine follows the local gh account, so no
          # default login exists).
          AUTO_GH_ACCOUNT: ${{ vars.AUTO_GH_ACCOUNT || '' }}
          AUTO_BASE_BRANCH: develop-auto
        run: |
          set -euo pipefail

          is_auto_pr=false
          case "$HEAD_REF" in
            auto/*) is_auto_pr=true ;;
          esac
          if [ -n "$AUTO_GH_ACCOUNT" ] && [ "$PR_AUTHOR" = "$AUTO_GH_ACCOUNT" ]; then
            is_auto_pr=true
          fi

          if [ "$is_auto_pr" != "true" ]; then
            echo "Not an auto PR (author=$PR_AUTHOR head=$HEAD_REF); base guard not applicable."
            exit 0
          fi

          if [ "$BASE_REF" != "$AUTO_BASE_BRANCH" ]; then
            echo "::error title=Base-lock violation::auto PR (author=$PR_AUTHOR head=$HEAD_REF) targets '$BASE_REF'; must target '$AUTO_BASE_BRANCH'."
            exit 1
          fi

          echo "OK: auto PR correctly targets $AUTO_BASE_BRANCH."
