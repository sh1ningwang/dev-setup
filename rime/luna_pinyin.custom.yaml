patch:
  # 預設輸出簡體
  switches/@2/reset: 1

  # 模糊拼音
  "speller/algebra":
    - erase/^xx$/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    # 模糊音規則
    - derive/^([zcs])h/$1/
    - derive/^([zcs])([^h])/$1h$2/
    - derive/^n/l/
    - derive/^l/n/
    - derive/([ei])n$/$1ng/
    - derive/([ei])ng$/$1n/
    - derive/([iu])an$/$1ang/
    - derive/([iu])ang$/$1an/
